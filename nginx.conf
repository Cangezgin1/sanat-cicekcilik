# sanatcicekcilik.com.tr → frontend
# panel.sanatcicekcilik.com.tr → admin
# api.sanatcicekcilik.com.tr → backend (opsiyonel, alt domain olmadan da çalışır)

server {
    listen 80;
    server_name sanatcicekcilik.com.tr www.sanatcicekcilik.com.tr;

    # HTTPS'ye yönlendir (certbot kurulunca aktif et)
    # return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 10M;
    }

    location /uploads/ {
        proxy_pass http://backend:5000;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name panel.sanatcicekcilik.com.tr;

    # HTTPS'ye yönlendir (certbot kurulunca aktif et)
    # return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 10M;
    }

    location /uploads/ {
        proxy_pass http://backend:5000;
    }

    location / {
        proxy_pass http://admin:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
